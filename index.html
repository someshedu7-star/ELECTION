<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vote Somesh Bali | IGNIS House Captain 2026-27</title>

  <meta name="description"
    content="Promotional campaign website for Somesh Bali, candidate for IGNIS House Captain at Podar International School Washim, Students Council 2026-27.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./style.css">
</head>

<body>

<!-- FIRE BACKGROUND -->
<div class="fire-glow">
  <span></span><span></span><span></span><span></span>
</div>

<div class="page-shell">

<!-- HEADER -->
<header class="masthead">

  <!-- ✅ LANGUAGE BUTTONS (JS CONTROLLED) -->
  <div class="language-switch">
    <button class="lang-btn" onclick="setLanguage('en')">English</button>
    <button class="lang-btn" onclick="setLanguage('hi')">हिंदी</button>
    <button class="lang-btn" onclick="setLanguage('mr')">मराठी</button>
  </div>

  <div class="school-brand">
    <img src="podar-logo.png" style="width:180px;">
    <div>
      <p data-i18n="schoolTag">Since 1927 Legacy of Excellence</p>
      <p data-i18n="schoolName">PODAR INTERNATIONAL SCHOOL WASHIM</p>
    </div>
  </div>

  <p data-i18n="electionTag">Students Council 2026-27 | IGNIS House Captain Campaign</p>

</header>

<!-- MAIN -->
<main>

<section class="hero">
  <div class="panel hero-copy">

    <span data-i18n="kicker">Vote for leadership with energy and purpose</span>

    <h1 data-i18n="heroTitle">Somesh Bali for IGNIS House Captain</h1>

    <p data-i18n="candidateLine">Grade 9 Rose | Students Council Election 2026-27</p>

    <p data-i18n="lead"></p>

    <div class="slogan-row">
      <span class="badge" data-i18n="badge1"></span>
      <span class="badge" data-i18n="badge2"></span>
      <span class="badge" data-i18n="badge3"></span>
    </div>

    <!-- COUNTDOWN -->
    <div class="countdown-shell">
      <p data-i18n="countdownLabel"></p>

      <div class="countdown-grid">
        <div>
          <span id="days">00</span>
          <span data-i18n="daysLabel"></span>
        </div>
        <div>
          <span id="hours">00</span>
          <span data-i18n="hoursLabel"></span>
        </div>
        <div>
          <span id="minutes">00</span>
          <span data-i18n="minutesLabel"></span>
        </div>
        <div>
          <span id="seconds">00</span>
          <span data-i18n="secondsLabel"></span>
        </div>
      </div>

      <p id="countdown-note" data-i18n="countdownNote"></p>
    </div>

    <div>
      <a href="#goals" data-i18n="ctaGoals"></a>
      <a href="#vote" data-i18n="ctaWhyVote"></a>
    </div>

  </div>

  <!-- POSTER (FIXED ISSUE HERE ✅) -->
  <aside class="panel poster-card">
    <img src="somesh-campaign-poster.png">
    <p data-i18n="posterNote"></p>
  </aside>

</section>

<!-- WHY ME -->
<section id="vote">
  <h2 data-i18n="whyMeTitle"></h2>
  <p data-i18n="whyMeCopy"></p>
</section>

<!-- GOALS -->
<section id="goals">
  <h2 data-i18n="goalsTitle"></h2>
</section>

<!-- FINAL CTA -->
<section id="final-call">
  <h1 data-i18n="finalVoteLine1"></h1>
  <p data-i18n="finalVoteLine2"></p>

  <p data-i18n="finalCopy"></p>
</section>

</main>

<p data-i18n="footerNote"></p>

</div>

<!-- SCRIPT -->
<script src="./script.js"></script>

</body>
</html>
